        function renderStandingChart() {
            const canvas = document.getElementById('pnl-chart');
            const ctx = canvas.getContext('2d');

            // Destroy existing chart if it exists
            if (pnlChart) {
                pnlChart.destroy();
            }

            // Collect Standing AT data for each date that has data
            const labels = [];
            const data = [];

            portfolioData.dates.forEach((date, colIndex) => {
                if (portfolioData.hiddenCols.has(colIndex)) return;

                // Calculate Standing AT for this column (Unrealized + Realized only)
                const unrealizedKey = `unrealized-${colIndex}`;
                const unrealizedData = portfolioData.cells[unrealizedKey];
                const unrealizedValue = parseFloat(unrealizedData?.value?.toString().replace(/,/g, '') || 0);

                const realizedKey = `realized-${colIndex}`;
                const realizedData = portfolioData.cells[realizedKey];
                const realizedValue = parseFloat(realizedData?.value?.toString().replace(/,/g, '') || 0);

                const total = unrealizedValue + realizedValue;

                // Only add to chart if there's any data for this date
                if (unrealizedData?.value || realizedData?.value) {
                    labels.push(date);
                    data.push(total);
                }
            });

            // Only render if we have data
            if (labels.length === 0) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#8b96b0';
                ctx.font = '14px JetBrains Mono';
                ctx.textAlign = 'center';
                ctx.fillText('No Standing AT data to display', canvas.width / 2, canvas.height / 2);
                return;
            }

            // Create gradient for line
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, 'rgba(0, 245, 255, 0.4)');
            gradient.addColorStop(1, 'rgba(0, 245, 255, 0.05)');

            // Find min and max indices
            const maxVal = Math.max(...data);
            const minVal = Math.min(...data);
            const maxIdx = data.indexOf(maxVal);
            const minIdx = data.lastIndexOf(minVal);

            // Build per-point styles to highlight min/max
            const pointRadii = data.map((_, i) => (i === maxIdx || i === minIdx) ? 8 : 4);
            const pointBgColors = data.map((_, i) => i === maxIdx ? '#00ff88' : i === minIdx ? '#ff3366' : '#00f5ff');
            const pointBorderColors = data.map((_, i) => i === maxIdx ? '#00ff88' : i === minIdx ? '#ff3366' : '#0a0e1a');
            const pointBorderWidths = data.map((_, i) => (i === maxIdx || i === minIdx) ? 3 : 2);

            // Custom plugin to draw bubble labels on min/max points
            const minMaxLabelPlugin = {
                id: 'minMaxLabels',
                afterDatasetsDraw(chart) {
                    const dataset = chart.data.datasets[0];
                    const meta = chart.getDatasetMeta(0);
                    if (!meta || !meta.data) return;
                    const chartCtx = chart.ctx;

                    [maxIdx, minIdx].forEach(idx => {
                        const point = meta.data[idx];
                        if (!point) return;
                        const val = dataset.data[idx];
                        const isMax = idx === maxIdx;
                        const formattedVal = val.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                        const tagText = isMax ? 'HIGH' : 'LOW';
                        const bgColor = isMax ? 'rgba(0, 255, 136, 0.15)' : 'rgba(255, 51, 102, 0.15)';
                        const borderColor = isMax ? '#00ff88' : '#ff3366';
                        const textColor = isMax ? '#00ff88' : '#ff3366';

                        chartCtx.save();

                        // Measure tag and value separately
                        chartCtx.font = 'bold 10px JetBrains Mono';
                        const tagWidth = chartCtx.measureText(tagText).width;
                        chartCtx.font = 'bold 13px JetBrains Mono';
                        const valWidth = chartCtx.measureText(formattedVal).width;
                        const contentW = Math.max(tagWidth, valWidth);

                        const padX = 10, padY = 6, bubbleRadius = 10;
                        const boxW = contentW + padX * 2;
                        const boxH = 40 + padY * 2;
                        const arrowH = 7;

                        // Position above for max, below for min
                        let yOffset = isMax ? -(boxH + arrowH + 8) : (arrowH + 8);
                        let x = point.x - boxW / 2;
                        let y = point.y + yOffset;

                        // Clamp within chart area
                        const area = chart.chartArea;
                        if (x < area.left + 4) x = area.left + 4;
                        if (x + boxW > area.right - 4) x = area.right - boxW - 4;
                        if (y < area.top + 2) y = area.top + 2;
                        if (y + boxH > area.bottom - 2) y = area.bottom - boxH - 2;

                        // Draw bubble shadow
                        chartCtx.shadowColor = borderColor;
                        chartCtx.shadowBlur = 12;
                        chartCtx.shadowOffsetX = 0;
                        chartCtx.shadowOffsetY = 0;
                        chartCtx.fillStyle = bgColor;
                        chartCtx.beginPath();
                        chartCtx.roundRect(x, y, boxW, boxH, bubbleRadius);
                        chartCtx.fill();
                        chartCtx.shadowBlur = 0;

                        // Draw bubble border
                        chartCtx.strokeStyle = borderColor;
                        chartCtx.lineWidth = 2;
                        chartCtx.beginPath();
                        chartCtx.roundRect(x, y, boxW, boxH, bubbleRadius);
                        chartCtx.stroke();

                        // Draw arrow pointing to the data point
                        const arrowX = point.x;
                        const arrowBaseY = isMax ? y + boxH : y;
                        const arrowTipY = isMax ? arrowBaseY + arrowH : arrowBaseY - arrowH;
                        chartCtx.fillStyle = bgColor;
                        chartCtx.strokeStyle = borderColor;
                        chartCtx.lineWidth = 2;
                        chartCtx.beginPath();
                        chartCtx.moveTo(arrowX - 6, arrowBaseY);
                        chartCtx.lineTo(arrowX, arrowTipY);
                        chartCtx.lineTo(arrowX + 6, arrowBaseY);
                        chartCtx.closePath();
                        chartCtx.fill();
                        chartCtx.stroke();
                        // Redraw the base edge to hide the border between arrow and bubble
                        chartCtx.strokeStyle = bgColor;
                        chartCtx.lineWidth = 3;
                        chartCtx.beginPath();
                        chartCtx.moveTo(arrowX - 7, arrowBaseY);
                        chartCtx.lineTo(arrowX + 7, arrowBaseY);
                        chartCtx.stroke();

                        // Draw tag text (HIGH / LOW)
                        chartCtx.fillStyle = textColor;
                        chartCtx.textAlign = 'center';
                        chartCtx.textBaseline = 'middle';
                        chartCtx.font = 'bold 10px JetBrains Mono';
                        chartCtx.globalAlpha = 0.7;
                        chartCtx.fillText(tagText, x + boxW / 2, y + padY + 8);
                        chartCtx.globalAlpha = 1.0;

                        // Draw value text (bold, larger)
                        chartCtx.font = 'bold 13px JetBrains Mono';
                        chartCtx.fillText(formattedVal, x + boxW / 2, y + padY + 28);

                        chartCtx.restore();
                    });
                }
            };

            pnlChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Standing AT',
                        data: data,
                        borderColor: '#00f5ff',
                        backgroundColor: gradient,
                        borderWidth: 2,
                        fill: true,
                        tension: 0.3,
                        pointRadius: pointRadii,
                        pointBackgroundColor: pointBgColors,
                        pointBorderColor: pointBorderColors,
                        pointBorderWidth: pointBorderWidths,
                        pointHoverRadius: 6,
                        pointHoverBackgroundColor: '#00ff88',
                        pointHoverBorderColor: '#00f5ff',
                        pointHoverBorderWidth: 2
                    }]
                },
                plugins: [minMaxLabelPlugin],
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top',
                            align: 'end',
                            labels: {
                                color: '#e0e6f0',
                                font: {
                                    family: 'JetBrains Mono',
                                    size: 13,
                                    weight: '600'
                                },
                                padding: 15,
                                usePointStyle: true,
                                pointStyle: 'circle',
                                boxWidth: 8,
                                boxHeight: 8,
                                textAlign: 'left'
                            }
                        },
                        tooltip: {
                            backgroundColor: '#1e2840',
                            titleColor: '#00f5ff',
                            bodyColor: '#e0e6f0',
                            borderColor: '#00f5ff',
                            borderWidth: 1,
                            padding: 12,
                            displayColors: false,
                            titleFont: {
                                family: 'JetBrains Mono',
                                size: 13,
                                weight: 'bold'
                            },
                            bodyFont: {
                                family: 'JetBrains Mono',
                                size: 12
                            },
                            callbacks: {
                                label: function(context) {
                                    const value = context.parsed.y;
                                    return 'Standing AT: ' + value.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                color: '#2a3752',
                                drawBorder: false
                            },
                            ticks: {
                                color: '#8b96b0',
                                font: {
                                    family: 'JetBrains Mono',
                                    size: 11
                                },
                                maxRotation: 45,
                                minRotation: 45
                            }
                        },
                        y: {
                            grid: {
                                color: '#2a3752',
                                drawBorder: false
                            },
                            ticks: {
                                color: '#8b96b0',
                                font: {
                                    family: 'JetBrains Mono',
                                    size: 11
                                },
                                callback: function(value) {
                                    return value.toLocaleString('en-US');
                                }
                            },
                            border: {
                                dash: [5, 5]
                            }
                        }
                    }
                }
            });
        }

        function renderDailyPnLChart() {
            const canvas = document.getElementById('pnl-chart');
            const ctx = canvas.getContext('2d');

            if (pnlChart) {
                pnlChart.destroy();
            }

            // Collect daily realized P&L (sum of bold cells per day)
            // Also build a per-day contract breakdown for the tooltip
            const labels = [];
            const data = [];
            const breakdowns = []; // parallel array: breakdowns[i] = [{name, value}, ...]

            portfolioData.dates.forEach((date, colIndex) => {
                if (portfolioData.hiddenCols.has(colIndex)) return;

                let dayTotal = 0;
                let hasData = false;
                const dayContracts = [];

                portfolioData.contracts.forEach((contract, rowIndex) => {
                    const cellKey = `${rowIndex}-${colIndex}`;
                    const cellData = portfolioData.cells[cellKey];

                    // Only count bold/realized cells
                    if (cellData?.value && cellData.bold) {
                        const value = parseFloat(cellData.value.toString().replace(/,/g, '') || 0);
                        dayTotal += value;
                        hasData = true;
                        // Merge contracts with same name (long + short of same underlying)
                        const existing = dayContracts.find(c => c.name === contract);
                        if (existing) {
                            existing.value += value;
                        } else {
                            dayContracts.push({ name: contract, value });
                        }
                    }
                });

                if (hasData) {
                    labels.push(date);
                    data.push(dayTotal);
                    // Sort descending by absolute value so biggest contributors are first
                    dayContracts.sort((a, b) => Math.abs(b.value) - Math.abs(a.value));
                    breakdowns.push(dayContracts);
                }
            });

            if (labels.length === 0) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#8b96b0';
                ctx.font = '14px JetBrains Mono';
                ctx.textAlign = 'center';
                ctx.fillText('No daily P&L data to display', canvas.width / 2, canvas.height / 2);
                return;
            }

            // Color bars based on positive/negative
            const backgroundColors = data.map(val => val >= 0 ? 'rgba(0, 255, 136, 0.6)' : 'rgba(255, 51, 102, 0.6)');
            const borderColors = data.map(val => val >= 0 ? '#00ff88' : '#ff3366');

            const fmt = v => (v >= 0 ? '+' : '') + v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

            pnlChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Daily Realized P&L',
                        data: data,
                        backgroundColor: backgroundColors,
                        borderColor: borderColors,
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'nearest',
                        axis: 'x',
                        intersect: false
                    },
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: '#1e2840',
                            titleColor: '#00f5ff',
                            bodyColor: '#e0e6f0',
                            borderColor: '#00f5ff',
                            borderWidth: 1,
                            padding: 12,
                            titleFont: {
                                family: 'JetBrains Mono',
                                size: 13,
                                weight: 'bold'
                            },
                            bodyFont: {
                                family: 'JetBrains Mono',
                                size: 12
                            },
                            callbacks: {
                                label: function(context) {
                                    const value = context.parsed.y;
                                    const sign = value >= 0 ? '+' : '';
                                    return 'Total P&L:  ' + sign + value.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                                },
                                afterBody: function(contexts) {
                                    const idx = contexts[0].dataIndex;
                                    const contracts = breakdowns[idx];
                                    if (!contracts || contracts.length === 0) return [];
                                    const lines = ['', '\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500'];
                                    contracts.forEach(c => {
                                        const valStr = fmt(c.value);
                                        // Pad name to align values
                                        const name = c.name.length > 18 ? c.name.slice(0, 17) + '\u2026' : c.name;
                                        lines.push(name.padEnd(20) + valStr);
                                    });
                                    return lines;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                color: '#2a3752',
                                drawBorder: false
                            },
                            ticks: {
                                color: '#8b96b0',
                                font: {
                                    family: 'JetBrains Mono',
                                    size: 11
                                },
                                maxRotation: 45,
                                minRotation: 45
                            }
                        },
                        y: {
                            grid: {
                                color: '#2a3752',
                                drawBorder: false

        function updateSummaryStats() {
            const container = document.getElementById('summary-stats');

            let totalProfit = 0;
            let totalLoss   = 0;

            // Per-contract contribution maps  { contractName -> number }
            const profitByContract = {};
            const lossByContract   = {};

            // Calculate from all bold cells (including hidden rows)
            portfolioData.contracts.forEach((contract, rowIndex) => {
                portfolioData.dates.forEach((date, colIndex) => {
                    if (portfolioData.hiddenCols.has(colIndex)) return;

                    const cellKey  = `${rowIndex}-${colIndex}`;
                    const cellData = portfolioData.cells[cellKey];

                    // Only count bold/realized cells
                    if (cellData?.value && cellData.bold) {
                        const value = parseFloat(cellData.value.toString().replace(/,/g, '') || 0);
                        if (value > 0) {
                            totalProfit += value;
                            profitByContract[contract] = (profitByContract[contract] ?? 0) + value;
                        } else if (value < 0) {
                            totalLoss += value;
                            lossByContract[contract]   = (lossByContract[contract]   ?? 0) + value;
                        }
                    }
                });
            });

            const grossPnL = totalProfit + totalLoss;
            const fmt = v => v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

            container.innerHTML = '';

            // ── Helper: build a stat tile DOM node with optional breakdown tooltip ──
            function makeTile(label, value, cssClass, breakdownMap) {
                const tile = document.createElement('div');
                tile.className = 'stat-tile';
                if (breakdownMap) tile.style.cursor = 'default';

                const lbl = document.createElement('div');
                lbl.className = 'stat-tile-label';
                lbl.textContent = label;

                const val = document.createElement('div');
                val.className = `stat-tile-value ${cssClass}`;
                val.textContent = fmt(value);

                tile.appendChild(lbl);
                tile.appendChild(val);

                if (breakdownMap && Object.keys(breakdownMap).length > 0) {
                    tile.addEventListener('mouseenter', (e) => showStatTooltip(e, label, breakdownMap));
                    tile.addEventListener('mousemove',  (e) => repositionStatTooltip(e));
                    tile.addEventListener('mouseleave', hideStatTooltip);
                }

                return tile;
            }

            container.appendChild(makeTile('Total Profit', totalProfit, 'profit', profitByContract));
            container.appendChild(makeTile('Total Loss',   totalLoss,   'loss',   lossByContract));
            container.appendChild(makeTile('Gross P&L',    grossPnL,    'gross',  null));
        }

        // Generated by GitHub Copilot
        /**
         * Show a per-contract breakdown tooltip anchored to the hovered tile.
         * Uses position:fixed so it is never clipped by overflow or sticky parents.
         */
        function showStatTooltip(e, title, breakdownMap) {
            const tip = document.getElementById('stat-breakdown-tooltip');
            if (!tip) return;

            tip.innerHTML = '';
            tip.setAttribute('aria-hidden', 'false');

            const hd = document.createElement('div');
            hd.className = 'sbt-title';
            hd.textContent = title + ' breakdown';
            tip.appendChild(hd);

            // Sort entries: profits descending, losses ascending (largest loss first)
            const entries = Object.entries(breakdownMap)
                .sort((a, b) => Math.abs(b[1]) - Math.abs(a[1]));

            const fmtVal = v => (v > 0 ? '+' : '') +
                v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

            entries.forEach(([name, val]) => {
                const row = document.createElement('div');
                row.className = 'sbt-row';

                const nm = document.createElement('span');
                nm.className = 'sbt-name';
                nm.textContent = name;
                nm.title = name; // full name on native hover for truncated labels

                const vl = document.createElement('span');
                vl.className = 'sbt-value ' + (val >= 0 ? 'pos' : 'neg');
                vl.textContent = fmtVal(val);

                row.appendChild(nm);
                row.appendChild(vl);
                tip.appendChild(row);
            });

            repositionStatTooltip(e);
            tip.style.display = 'block';
        }

        function repositionStatTooltip(e) {
            const tip = document.getElementById('stat-breakdown-tooltip');
            if (!tip || tip.style.display === 'none') return;

            const GAP = 12;
            const tw  = tip.offsetWidth  || 260;
            const th  = tip.offsetHeight || 100;
            let   left = e.clientX + GAP;
            let   top  = e.clientY + GAP;

            // Keep within viewport
            if (left + tw > window.innerWidth  - 8) left = e.clientX - tw - GAP;
            if (top  + th > window.innerHeight - 8) top  = e.clientY - th - GAP;

            tip.style.left = left + 'px';
            tip.style.top  = top  + 'px';
        }

        function hideStatTooltip() {
            const tip = document.getElementById('stat-breakdown-tooltip');
            if (tip) {
                tip.style.display = 'none';
                tip.setAttribute('aria-hidden', 'true');
            }
        }

        function editCell(element, cellKey, currentValue) {
            if (currentEditingCell) return;
            
            currentEditingCell = { element, cellKey };
            
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'cell-input';
            input.value = currentValue || '';
            
            // Apply existing formatting to the input field
            if (!cellKey.startsWith('contract-') && portfolioData.cells[cellKey]) {
                if (portfolioData.cells[cellKey].bold) {
                    input.style.fontWeight = '700';
                }
                if (portfolioData.cells[cellKey].larger) {
                    input.style.fontSize = '21px';
                }
            }
            
            input.onblur = () => saveCellEdit(input, cellKey);
            input.onkeydown = (e) => {
                if (e.key === 'Enter') {
                    saveCellEdit(input, cellKey);
                } else if (e.key === 'Escape') {
                    cancelCellEdit();
                } else if (e.key === 'Tab') {
                    e.preventDefault();
                    saveCellEdit(input, cellKey);
                    // Move to next cell in same column
                    navigateToNextCell(cellKey, e.shiftKey);
                }
            };
            
            element.innerHTML = '';
            element.appendChild(input);
            input.focus();

            // Show formatting toolbar and update button states
            document.getElementById('formatting-toolbar').classList.add('active');
            
            // Update button states based on current formatting
            if (!cellKey.startsWith('contract-') && portfolioData.cells[cellKey]) {
                const boldBtn = document.getElementById('bold-btn');
                const largerBtn = document.getElementById('larger-btn');
                
                if (portfolioData.cells[cellKey].bold) {
                    boldBtn.classList.add('active');
                } else {
                    boldBtn.classList.remove('active');
                }
                
                if (portfolioData.cells[cellKey].larger) {
                    largerBtn.classList.add('active');
                } else {
                    largerBtn.classList.remove('active');
                }
            } else {
                // Reset button states for contract cells or new cells
                document.getElementById('bold-btn').classList.remove('active');
                document.getElementById('larger-btn').classList.remove('active');
            }
        }

        function saveCellEdit(input, cellKey) {
            const value = input.value.trim();
            
            if (cellKey.startsWith('contract-')) {
                const rowIndex = parseInt(cellKey.split('-')[1]);
                portfolioData.contracts[rowIndex] = value;
            } else {
                if (!portfolioData.cells[cellKey]) {
                    portfolioData.cells[cellKey] = { value: '', bold: false, larger: false };
                }
                portfolioData.cells[cellKey].value = value;
            }
            
            currentEditingCell = null;
            document.getElementById('formatting-toolbar').classList.remove('active');
            saveCurrentMonthData();
            renderTable();
        }

        function cancelCellEdit() {
            currentEditingCell = null;
            document.getElementById('formatting-toolbar').classList.remove('active');
            renderTable();
        }

        function navigateToNextCell(cellKey, shiftKey) {
            // Parse the current cell key
            const parts = cellKey.split('-');
            
            // Handle special rows (unrealized, realized) and contract rows differently
            if (parts[0] === 'unrealized' || parts[0] === 'realized') {
                // For calculated rows, don't navigate - these are not in the contracts array
                return;
            }
            
            if (cellKey.startsWith('contract-')) {
                // Contract name cells - navigate to next/previous contract
                const rowIndex = parseInt(parts[1]);
                const direction = shiftKey ? -1 : 1;
                const nextRowIndex = rowIndex + direction;
                
                if (nextRowIndex >= 0 && nextRowIndex < portfolioData.contracts.length) {
                    // Wait for table to re-render
                    setTimeout(() => {
                        const nextCellKey = `contract-${nextRowIndex}`;
                        const cells = document.querySelectorAll('.cell-editable');
                        for (let cell of cells) {
                            if (cell.parentElement.querySelector('.drag-handle')) {
                                const tr = cell.closest('tr');
                                if (tr && parseInt(tr.dataset.rowIndex) === nextRowIndex) {
                                    cell.click();
                                    break;
                                }
                            }
                        }
                    }, 50);
                }
                return;
            }
            
            // Regular data cells - navigate down/up in same column
            const rowIndex = parseInt(parts[0]);
            const colIndex = parseInt(parts[1]);
            const direction = shiftKey ? -1 : 1;
            
            // Find next visible row
            let nextRowIndex = rowIndex + direction;
            while (nextRowIndex >= 0 && nextRowIndex < portfolioData.contracts.length) {
                if (!portfolioData.hiddenRows.has(nextRowIndex)) {
                    break;
                }
                nextRowIndex += direction;
            }
            
            // Check if we can navigate to calculated rows
            if (nextRowIndex >= portfolioData.contracts.length && !shiftKey) {
                // Move to unrealized row
                const nextCellKey = `unrealized-${colIndex}`;
                setTimeout(() => {
                    const cells = document.querySelectorAll('.cell-editable');
                    for (let cell of cells) {
                        if (cell.parentElement.parentElement.classList.contains('unrealized-row')) {
                            const cellDivs = cell.parentElement.parentElement.querySelectorAll('.cell-editable');
                            let currentCol = 0;
                            for (let i = 0; i < portfolioData.dates.length; i++) {
                                if (!portfolioData.hiddenCols.has(i)) {
                                    if (i === colIndex) {
                                        cellDivs[currentCol]?.click();
                                        return;
                                    }
                                    currentCol++;
                                }
                            }
                        }
                    }
                }, 50);
                return;
            }
            
            if (nextRowIndex >= 0 && nextRowIndex < portfolioData.contracts.length) {
                const nextCellKey = `${nextRowIndex}-${colIndex}`;
                setTimeout(() => {
                    const cells = document.querySelectorAll('.cell-editable');
                    for (let cell of cells) {
                        const tr = cell.closest('tr');
                        if (tr && parseInt(tr.dataset.rowIndex) === nextRowIndex) {
                            const cellDivs = tr.querySelectorAll('.cell-editable');
                            // Skip the first cell (contract name)
                            let currentCol = 0;
                            for (let i = 0; i < portfolioData.dates.length; i++) {
                                if (!portfolioData.hiddenCols.has(i)) {
                                    if (i === colIndex) {
                                        cellDivs[currentCol + 1]?.click(); // +1 to skip contract cell
                                        return;
                                    }
                                    currentCol++;
                                }
                            }
                        }
                    }
                }, 50);
            }
        }

        function formatCell(type) {
            if (!currentEditingCell) return;
            
            const cellKey = currentEditingCell.cellKey;
            const element = currentEditingCell.element;
            
            if (!cellKey.startsWith('contract-')) {
                if (!portfolioData.cells[cellKey]) {
                    portfolioData.cells[cellKey] = { value: '', bold: false, larger: false };
                }
                
                if (type === 'bold') {
                    portfolioData.cells[cellKey].bold = !portfolioData.cells[cellKey].bold;
                    const boldBtn = document.getElementById('bold-btn');
                    if (portfolioData.cells[cellKey].bold) {
                        boldBtn.classList.add('active');
                    } else {
                        boldBtn.classList.remove('active');
                    }
                } else if (type === 'larger') {
                    portfolioData.cells[cellKey].larger = !portfolioData.cells[cellKey].larger;
                    const largerBtn = document.getElementById('larger-btn');
                    if (portfolioData.cells[cellKey].larger) {
                        largerBtn.classList.add('active');
                    } else {
                        largerBtn.classList.remove('active');
                    }
                }
                
                // Apply formatting to the current input element immediately
                const input = element.querySelector('input');
                if (input) {
                    if (portfolioData.cells[cellKey].bold) {
                        input.style.fontWeight = '700';
                    } else {
                        input.style.fontWeight = '400';
                    }
                    
                    if (portfolioData.cells[cellKey].larger) {
                        input.style.fontSize = '21px';
                    } else {
                        input.style.fontSize = '17px';
                    }
                    
                    // Refocus the input to prevent losing focus
                    input.focus();
                }
                
                saveCurrentMonthData();
            }
        }

        function deleteRow(index) {
            if (confirm('Delete this contract?')) {
                portfolioData.contracts.splice(index, 1);
                portfolioData.hiddenRows.delete(index);
                
                // Clean up cell data
                Object.keys(portfolioData.cells).forEach(key => {
                    const [row] = key.split('-');
                    if (parseInt(row) === index) {
                        delete portfolioData.cells[key];
                    }
                });

                // Reindex contractPositions after deletion
                const newPositions = {};
                Object.keys(portfolioData.contractPositions || {}).forEach(k => {
                    const ki = parseInt(k);
                    if (ki === index) return;
                    newPositions[ki > index ? ki - 1 : ki] = portfolioData.contractPositions[k];
                });
                portfolioData.contractPositions = newPositions;
                
                saveCurrentMonthData();
                renderTable();
            }
        }

        function deleteColumn(index) {
            if (confirm('Delete this date column?')) {
                portfolioData.dates.splice(index, 1);
                
                // Reindex cell data - shift all columns after the deleted one
                const newCells = {};
                Object.keys(portfolioData.cells).forEach(key => {
                    const parts = key.split('-');
                    
                    // Handle special rows (unrealized, realized)
                    if (parts[0] === 'unrealized' || parts[0] === 'realized') {
                        const col = parseInt(parts[1]);
                        if (col === index) {
                            // Delete this column's data
                            return;
                        } else if (col > index) {
                            // Shift column index down
                            newCells[`${parts[0]}-${col - 1}`] = portfolioData.cells[key];
                        } else {
                            // Keep as-is
                            newCells[key] = portfolioData.cells[key];
                        }
                    } else {
                        // Handle regular row-column cells
                        const rowIdx = parseInt(parts[0]);
                        const colIdx = parseInt(parts[1]);
                        
                        if (colIdx === index) {
                            // Delete this column's data
                            return;
                        } else if (colIdx > index) {
                            // Shift column index down
                            newCells[`${rowIdx}-${colIdx - 1}`] = portfolioData.cells[key];
                        } else {
                            // Keep as-is
                            newCells[key] = portfolioData.cells[key];
                        }
                    }
                });
                portfolioData.cells = newCells;
                
                // Reindex hidden columns
                const newHiddenCols = new Set();
                portfolioData.hiddenCols.forEach(hiddenIdx => {
                    if (hiddenIdx === index) {
                        // Skip - this column is being deleted
                        return;
                    } else if (hiddenIdx > index) {
                        newHiddenCols.add(hiddenIdx - 1);
                    } else {
                        newHiddenCols.add(hiddenIdx);
                    }
                });
                portfolioData.hiddenCols = newHiddenCols;
                
                saveCurrentMonthData();
                renderTable();
            }
        }

        // Drag and Drop Functions
        function handleDragStart(e, rowIndex) {

        // ─── Pan-to-scroll (PDF-viewer style drag) with momentum ───
        (function initPan() {
            const container = document.getElementById('table-container-wrap');
            // We attach after DOM is ready; use a small delay so the element exists
            requestAnimationFrame(() => {
                const el = document.querySelector('.table-container');
                if (!el) return;

                let startX, startY, scrollLeft, scrollTop;
                let isDragging = false;

                // velocity tracking for momentum
                let lastX, lastY, lastTime;
                let velX = 0, velY = 0;
                let rafId = null;

                function onPointerDown(e) {
                    // ignore if the user clicked an interactive element or drag handle
                    if (e.target.closest('input, button, select, textarea, .cell-editable, .drag-handle')) return;

                    isDragging = true;
                    el.classList.add('panning');
                    startX = e.clientX;
                    startY = e.clientY;
                    scrollLeft = el.scrollLeft;
                    scrollTop = el.scrollTop;
                    lastX = e.clientX;
                    lastY = e.clientY;
                    lastTime = Date.now();
                    velX = 0;
                    velY = 0;
                    // kill any running momentum
                    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
                    e.preventDefault();
                }

                function onPointerMove(e) {
                    if (!isDragging) return;
                    e.preventDefault();

                    const now = Date.now();
                    const dt = now - lastTime || 1;

                    // track velocity (pixels per ms)
                    velX = (e.clientX - lastX) / dt;
                    velY = (e.clientY - lastY) / dt;
                    lastX = e.clientX;
                    lastY = e.clientY;
                    lastTime = now;

                    // scroll = start position – distance dragged
                    el.scrollLeft = scrollLeft - (e.clientX - startX);
                    el.scrollTop  = scrollTop  - (e.clientY - startY);
                }

                function onPointerUp(e) {
                    if (!isDragging) return;
                    isDragging = false;
                    el.classList.remove('panning');

                    // launch momentum if there's velocity
                    const speed = Math.sqrt(velX * velX + velY * velY);
                    if (speed > 0.05) {
                        startMomentum();
                    }
                }

                function startMomentum() {
                    // convert velocity to pixels-per-frame (assume ~16 ms frame)
                    let mx = velX * 16;
                    let my = velY * 16;
                    const friction = 0.92; // higher = slides longer

                    function tick() {
                        mx *= friction;
                        my *= friction;

                        el.scrollLeft -= mx;
                        el.scrollTop  -= my;

                        // stop when negligible
                        if (Math.abs(mx) < 0.5 && Math.abs(my) < 0.5) return;
                        rafId = requestAnimationFrame(tick);
                    }
                    rafId = requestAnimationFrame(tick);
                }

                el.addEventListener('pointerdown',  onPointerDown,  { passive: false });
                el.addEventListener('pointermove',   onPointerMove,  { passive: false });
                el.addEventListener('pointerup',     onPointerUp);
                el.addEventListener('pointercancel', onPointerUp);
                // also end drag if pointer leaves the container
                el.addEventListener('pointerleave',  onPointerUp);
            });
        })();

        // ─── Targets This Month ───
        /**
         * Compute the current-status value for a given date column.
         *
         * Formula:
         *   Realized component  = SUM of ALL bold cells in columns 0 → colIndex (inclusive)
         *   Running component   = SUM of non-bold cells in colIndex only
         *   Result              = Realized + Running
         *
         * This correctly accumulates multiple P&L booking events during the month
         * while adding the open-position running P&L for the target date.
         * Mirrors the Include Hidden toggle exactly like renderTargetsCard.
         */
        function computeStatusForCol(colIndex, includeHidden) {
            let realized = 0;
            let running  = 0;
            let hasData  = false;

            portfolioData.contracts.forEach((name, rowIndex) => {
                if (!includeHidden && portfolioData.hiddenRows.has(rowIndex)) return;

                // Accumulate ALL bold (realized) cells from the start of the month
                // up to and including the target column.
                for (let c = 0; c <= colIndex; c++) {
                    const cell = portfolioData.cells[`${rowIndex}-${c}`];
                    if (cell?.bold && cell.value !== undefined && cell.value !== '') {
                        realized += parseFloat(String(cell.value).replace(/,/g, '')) || 0;
                        hasData = true;
                    }
                }

                // Add the non-bold (open/running) value in the target column.
                const runCell = portfolioData.cells[`${rowIndex}-${colIndex}`];
                if (runCell && !runCell.bold && runCell.value !== undefined && runCell.value !== '') {
                    running += parseFloat(String(runCell.value).replace(/,/g, '')) || 0;
                    hasData = true;
                }
            });

            return hasData ? (realized + running) : null;
        }

        function openStatusHistoryPopup() {
            const backdrop = document.getElementById('status-history-backdrop');
            const body = document.getElementById('status-history-body');
            if (!backdrop || !body) return;

            const includeHidden = document.getElementById('targets-include-hidden')?.checked ?? false;

            // Determine the cutoff: only show dates strictly before today for the
            // current month; for a past month, show all dates.
            const now = new Date();
            const isCurrentMonth = now.getMonth() === currentMonth && now.getFullYear() === currentYear;
            const todayNum = now.getDate();

            // Build ordered list of {label, value|null} for eligible date columns.
            const entries = [];
            portfolioData.dates.forEach((dateLabel, colIndex) => {
                const d = parseDateStr(dateLabel, currentMonth, currentYear);
                if (!d || isNaN(d)) return;

                // Skip weekends — no trading data on Saturday (6) or Sunday (0).
                if (d.getDay() === 0 || d.getDay() === 6) return;

                // Skip columns that are hidden in the contract table.
                if (portfolioData.hiddenCols.has(colIndex)) return;

                // For the current month, skip today and any future dates.
                if (isCurrentMonth && d.getDate() >= todayNum) return;

                const value = computeStatusForCol(colIndex, includeHidden);
                if (value === null) return; // no data — hide per UX preference

                entries.push({ dateLabel, d, value });
            });

            // Render
            body.innerHTML = '';
            if (entries.length === 0) {
                body.innerHTML = '<div class="sh-no-data">No historical data available for this month yet.</div>';
            } else {
                // Find max absolute value for proportional intensity scaling.
                const maxAbs = entries.reduce((m, e) => Math.max(m, Math.abs(e.value)), 0) || 1;

                const grid = document.createElement('div');
                grid.className = 'sh-grid';

                const fmt = v => v.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });

                entries.forEach(({ dateLabel, d, value }) => {
                    const cell = document.createElement('div');
                    cell.className = 'sh-cell';

                    if (value > 0) {
                        cell.classList.add('positive');
                        // Scale intensity: 0.06 (faint) to 0.35 (vivid)
                        const intensity = 0.06 + (Math.abs(value) / maxAbs) * 0.29;
                        cell.style.setProperty('--sh-intensity', intensity.toFixed(3));
                    } else if (value < 0) {
                        cell.classList.add('negative');
                        const intensity = 0.06 + (Math.abs(value) / maxAbs) * 0.29;
                        cell.style.setProperty('--sh-intensity', intensity.toFixed(3));
                    } else {
                        cell.classList.add('zero');
                    }

                    const dayName = d.toLocaleDateString('en-US', { weekday: 'short' });
                    const sign = value > 0 ? '+' : '';

                    const dateDiv = document.createElement('div');
                    dateDiv.className = 'sh-cell-date';
                    dateDiv.textContent = dayName + ' · ' + dateLabel;

                    const valDiv = document.createElement('div');
                    valDiv.className = 'sh-cell-value';
                    valDiv.textContent = sign + fmt(value);

                    cell.appendChild(dateDiv);
                    cell.appendChild(valDiv);
                    grid.appendChild(cell);
                });

                body.appendChild(grid);
            }

            backdrop.classList.add('active');
            backdrop.focus();

            // Escape-key handler — stored on backdrop so it can be cleaned up.
            backdrop._escHandler = (e) => { if (e.key === 'Escape') closeStatusHistoryPopup(); };
            document.addEventListener('keydown', backdrop._escHandler);
        }

        /**
         * Normalise a raw contract name to a canonical display key.
         * Rules:
         *  - Strip month names (JAN–DEC, full names) and "FUT"  → suffix " FUT"
         *  - Strip "CE" or "PE"                                  → suffix " OPTION"
         *  - Strip bare numbers (strike prices / expiry codes)
         *  - Remaining tokens form the base name (uppercased)
         * Examples:
         *   "NIFTY JUNE"      → "NIFTY FUT"
         *   "NIFTY JULY"      → "NIFTY FUT"
         *   "NIFTY 24500 CE"  → "NIFTY OPTION"
         *   "NIFTY 24500 PE"  → "NIFTY OPTION"
         *   "SUZLON JUNE FUT" → "SUZLON FUT"
         *   "WIPRO"           → "WIPRO"
         */
        function contractDisplayKey(name) {
            const MONTHS = new Set([
                'JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC',
                'JANUARY','FEBRUARY','MARCH','APRIL','JUNE','JULY','AUGUST',
                'SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'
            ]);
            const tokens = name.trim().toUpperCase().split(/\s+/);
            let isFuture = false;
            let isOption = false;
            const base = [];
            for (const t of tokens) {
                if (MONTHS.has(t) || t === 'FUT') { isFuture = true; }
                else if (t === 'CE' || t === 'PE')  { isOption = true; }
                else if (/^\d+$/.test(t))            { /* strike / expiry – skip */ }
                else                                  { base.push(t); }
            }
            const baseName = base.join(' ');
            if (isOption) return baseName + ' OPTION';
            if (isFuture) return baseName + ' FUT';
            return baseName;
        }

        /**
         * Sync Current (Today) values in the Targets card from today's column
         * in the contracts table. Aggregates by contractDisplayKey group.
         * Respects the Include Hidden toggle.
         */
        function syncCurrentValues() {
            if (!portfolioData.contractTargets) portfolioData.contractTargets = {};

            // Locate today's date string in the dates array
            const now = new Date();
            const isCurrentMonth = now.getMonth() === currentMonth && now.getFullYear() === currentYear;
            if (!isCurrentMonth) {
                showNotification('Sync skipped', 'Today\'s column only exists in the current month view. Navigate to the current month to sync.', 'warning');
                return;
            }
            const todayStr = String(now.getDate()).padStart(2, '0') + '-' +
                             now.toLocaleDateString('en-US', { month: 'short' });
            const todayColIndex = portfolioData.dates.indexOf(todayStr);
            if (todayColIndex === -1) {
                showNotification('Sync skipped', 'Today\'s date column ("' + todayStr + '") was not found in the table. Add today\'s column first.', 'warning');
                return;
            }

            // Respect the Include Hidden toggle (same rule as renderTargetsCard)
            const includeHidden = document.getElementById('targets-include-hidden')?.checked ?? false;

            // Guard: if today's column is completely empty for all visible contracts,
            // skip the sync entirely. Without today's data the running component is
            // unknown and writing realized-only values would corrupt currentValue.
            const todayHasData = portfolioData.contracts.some((name, rowIndex) => {
                if (!includeHidden && portfolioData.hiddenRows.has(rowIndex)) return false;
                const cell = portfolioData.cells[`${rowIndex}-${todayColIndex}`];
                return cell?.value !== undefined && cell.value !== '';
            });
            if (!todayHasData) {
                showNotification('Sync skipped', 'No data entered for today\'s column yet. Fill in today\'s values before syncing.', 'warning');
                return;
            }
            // Realized component : SUM of ALL bold cells across every date column.
            //   Bold = a closed/booked P&L event. Multiple closings during the month
            //   are each a separate bold cell and must ALL be included.
            // Running component  : SUM of non-bold cells in TODAY's column only.
            //   Non-bold today   = the current open-position running P&L.
            // Current (Today)    = Realized + Running
            // ─────────────────────────────────────────────────────────────────────
            const realizedSums = {};
            const runningSums  = {};

            portfolioData.contracts.forEach((name, rowIndex) => {
                if (!includeHidden && portfolioData.hiddenRows.has(rowIndex)) return;
                const key = contractDisplayKey(name);

                // Sum ALL bold (realized) cells across the entire month.
                portfolioData.dates.forEach((_, colIndex) => {
                    const cell = portfolioData.cells[`${rowIndex}-${colIndex}`];
                    if (cell?.bold && cell.value !== undefined && cell.value !== '') {
                        const v = parseFloat(String(cell.value).replace(/,/g, '')) || 0;
                        realizedSums[key] = (realizedSums[key] ?? 0) + v;
                    }
                });

                // Add today's non-bold (open/running) value.
                const runCell = portfolioData.cells[`${rowIndex}-${todayColIndex}`];
                if (runCell && !runCell.bold && runCell.value !== undefined && runCell.value !== '') {
                    const v = parseFloat(String(runCell.value).replace(/,/g, '')) || 0;
                    runningSums[key] = (runningSums[key] ?? 0) + v;
                }
            });

            // Merge both components; include a group if it contributed any data.
            const allKeys = new Set([...Object.keys(realizedSums), ...Object.keys(runningSums)]);
            let updated = 0;
            for (const key of allKeys) {
                if (!portfolioData.contractTargets[key]) portfolioData.contractTargets[key] = {};
                const total = (realizedSums[key] ?? 0) + (runningSums[key] ?? 0);
                portfolioData.contractTargets[key].currentValue = String(total);
                updated++;
            }

            if (updated === 0) {
                showNotification('Sync complete', 'No contract values found for today. Cells may be empty.', 'info');
                return;
            }

            saveCurrentMonthData();
            renderTargetsCard();
            showNotification('Sync complete', updated + ' contract group' + (updated !== 1 ? 's' : '') + ' updated from today\'s column.', 'success');
        }

        function renderTargetsCard() {
            const container = document.getElementById('targets-list');
            const summaryEl = document.getElementById('targets-summary');
            if (!container || !summaryEl) return;

            // Update card title to show current month name
            const titleEl = document.getElementById('targets-card-title');
            if (titleEl) {
                const monthName = new Date(currentYear, currentMonth).toLocaleDateString('en-US', { month: 'long' });
                titleEl.textContent = '\u25e2 Targets \u2014 ' + monthName + ' ' + currentYear;
            }

            if (!portfolioData.contractTargets) portfolioData.contractTargets = {};

            // Respect the "Include Hidden" toggle
            const includeHidden = document.getElementById('targets-include-hidden')?.checked ?? false;
            syncTargetsToggleStyle();

            // Group contracts by their canonical display key.
            // When includeHidden is false, skip rows in hiddenRows.
            // uniqueContracts is an ordered array of display keys (e.g. "NIFTY FUT").
            const seen = new Set();
            const uniqueContracts = [];
            portfolioData.contracts.forEach((name, idx) => {
                if (!includeHidden && portfolioData.hiddenRows.has(idx)) return;
                const key = contractDisplayKey(name);
                if (seen.has(key)) return;
                seen.add(key);
                uniqueContracts.push(key);
            });

            container.innerHTML = '';

            if (uniqueContracts.length === 0) {
                container.innerHTML = '<div style="color:var(--text-secondary);font-size:12px;text-align:center;padding:20px;font-style:italic;">No contracts available. Add contracts to set targets.</div>';
                summaryEl.innerHTML = '';
                return;
            }

            // Header row
            const header = document.createElement('div');
            header.className = 'target-header-row';
            const headerLeft = document.createElement('div');
            const headerCols = document.createElement('div');
            headerCols.className = 'target-header-cols';
            headerCols.innerHTML = '<div class="target-header-col">Month Target</div><div class="target-header-col">Current (Today)</div><div class="target-header-col" style="text-align:right;">Progress</div>';
            header.appendChild(headerLeft);
            header.appendChild(headerCols);
            container.appendChild(header);

            uniqueContracts.forEach(name => {
                const tgt = portfolioData.contractTargets[name] || {};
                const monthTarget = parseFloat(tgt.monthTarget) || 0;
                const currentValue = parseFloat(tgt.currentValue) || 0;

                const { pctText, pctColor, barColor, barWidth } = calcProgress(monthTarget, currentValue);

                const row = document.createElement('div');
                row.className = 'target-row';

                const nameDiv = document.createElement('div');
                nameDiv.className = 'target-contract-name';
                nameDiv.textContent = name;
                nameDiv.title = name;

                const monthInput = document.createElement('input');
                monthInput.type = 'number';
                monthInput.className = 'target-input';
                monthInput.value = tgt.monthTarget !== undefined ? tgt.monthTarget : '';
                monthInput.placeholder = '0';
                monthInput.setAttribute('aria-label', name + ' month target');

                const currentInput = document.createElement('input');
                currentInput.type = 'number';
                currentInput.className = 'target-input';
                currentInput.value = tgt.currentValue !== undefined ? tgt.currentValue : '';
                currentInput.placeholder = '0';
                currentInput.setAttribute('aria-label', name + ' current value');

                const progressCol = document.createElement('div');
                progressCol.className = 'target-progress-col';
                const pctDiv = document.createElement('div');
                pctDiv.className = 'target-pct';
                pctDiv.textContent = pctText;
                pctDiv.style.color = pctColor;
                const barTrack = document.createElement('div');
                barTrack.className = 'target-bar-track';
                const barFill = document.createElement('div');
                barFill.className = 'target-bar-fill';
                barFill.style.width = barWidth + '%';
                barFill.style.background = barColor;
                barTrack.appendChild(barFill);
                progressCol.appendChild(pctDiv);
                progressCol.appendChild(barTrack);

                const inputsGrid = document.createElement('div');
                inputsGrid.className = 'target-inputs';
                inputsGrid.appendChild(monthInput);
                inputsGrid.appendChild(currentInput);
                inputsGrid.appendChild(progressCol);

                row.appendChild(nameDiv);
                row.appendChild(inputsGrid);
                container.appendChild(row);

                // Event listeners — no inline eval, safe closure over name
                function refreshRow() {
                    const mt = parseFloat(monthInput.value) || 0;
                    const cv = parseFloat(currentInput.value) || 0;
                    const r = calcProgress(mt, cv);
                    pctDiv.textContent = r.pctText;
                    pctDiv.style.color = r.pctColor;
                    barFill.style.width = r.barWidth + '%';
                    barFill.style.background = r.barColor;
                    updateTargetsSummary(uniqueContracts);
                }

                monthInput.addEventListener('input', () => {
                    if (!portfolioData.contractTargets[name]) portfolioData.contractTargets[name] = {};
                    portfolioData.contractTargets[name].monthTarget = monthInput.value;
                    refreshRow();
                });
                monthInput.addEventListener('change', saveCurrentMonthData);

                currentInput.addEventListener('input', () => {
                    if (!portfolioData.contractTargets[name]) portfolioData.contractTargets[name] = {};
                    portfolioData.contractTargets[name].currentValue = currentInput.value;
                    refreshRow();
                });
                currentInput.addEventListener('change', saveCurrentMonthData);
            });

            updateTargetsSummary(uniqueContracts);
        }

        function calcProgress(monthTarget, currentValue) {
            if (monthTarget === 0) {
                return { pctText: '—', pctColor: 'var(--text-secondary)', barColor: 'var(--accent-green)', barWidth: 0 };
            }
            const pct = (currentValue / monthTarget) * 100;
            const isPositive = pct >= 0;
            return {
                pctText: (isPositive ? '+' : '') + pct.toFixed(1) + '%',
                pctColor: isPositive ? 'var(--accent-green)' : 'var(--accent-red)',
                barColor: isPositive ? 'var(--accent-green)' : 'var(--accent-red)',
                barWidth: Math.min(Math.abs(pct), 100)
            };
        }

        function updateTargetsSummary(uniqueContracts) {
            const summaryEl = document.getElementById('targets-summary');
            if (!summaryEl) return;

            if (!uniqueContracts || uniqueContracts.length === 0) {
                summaryEl.innerHTML = '';
                return;
            }

            if (!portfolioData.contractTargets) portfolioData.contractTargets = {};

            let totalMonthTarget = 0;
            let totalCurrentValue = 0;
            uniqueContracts.forEach(name => {
                const tgt = portfolioData.contractTargets[name] || {};
                totalMonthTarget += parseFloat(tgt.monthTarget) || 0;
                totalCurrentValue += parseFloat(tgt.currentValue) || 0;
            });

            const r = calcProgress(totalMonthTarget, totalCurrentValue);
            const fmt = v => v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

            summaryEl.innerHTML = `
                <div class="targets-summary-label">Overall</div>
                <div class="targets-summary-values">
                    <div class="targets-summary-tile">
                        <div class="targets-summary-tile-label">Month Target</div>
                        <div class="targets-summary-tile-value">${fmt(totalMonthTarget)}</div>
                    </div>
                    <div class="targets-summary-tile" onclick="openStatusHistoryPopup()" style="cursor:pointer;" title="Click to view daily history for this month">
                        <div class="targets-summary-tile-label" style="display:flex;align-items:center;gap:5px;">Current Status <span style="font-size:10px;opacity:0.6;">&#x2197;</span></div>
                        <div class="targets-summary-tile-value">${fmt(totalCurrentValue)}</div>
                    </div>
                    <div class="targets-summary-tile">
                        <div class="targets-summary-tile-label">Achievement</div>
                        <div style="display:flex;flex-direction:column;gap:6px;">
                            <div class="targets-summary-tile-value" style="color:${r.pctColor}">${r.pctText}</div>
                            <div class="target-bar-track">
                                <div class="target-bar-fill" style="width:${r.barWidth}%;background:${r.barColor};"></div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // ─── Card Accordion ───
        function toggleCard(id) {
            const section = document.getElementById(id);
            if (!section) return;
            const isNowCollapsed = section.classList.toggle('card-collapsed');
            const header = section.querySelector('.card-header');
            if (header) header.setAttribute('aria-expanded', String(!isNowCollapsed));
            // Chart.js needs a re-render once its canvas becomes visible (after CSS transition)
            if (id === 'card-analytics' && !isNowCollapsed) {
                setTimeout(renderChart, 310);
            }
        }

        // ─── Card Accordion ───
        function toggleCard(id) {
            const section = document.getElementById(id);
            if (!section) return;
            const isNowCollapsed = section.classList.toggle('card-collapsed');
            const header = section.querySelector('.card-header');
            if (header) header.setAttribute('aria-expanded', String(!isNowCollapsed));
            // Chart.js needs a re-render once its canvas becomes visible (after CSS transition)
            if (id === 'card-analytics' && !isNowCollapsed) {
                setTimeout(renderChart, 310);
            }
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                saveCurrentMonthData();
                showNotification('Saved', 'Data saved successfully!', 'success');
            }
        });

        // Initialize on load
        init();
    </script>
</body>
</html>
